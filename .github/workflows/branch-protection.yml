name: Branch Protection

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    name: Restrict Source Branch for Main
    runs-on: ubuntu-latest
    steps:
      - name: Verify that source branch is develop
        shell: bash
        run: |
          # The branch being merged into (destination)
          BASE_BRANCH="${{ github.base_ref }}"
          # The branch being merged (source)
          HEAD_BRANCH="${{ github.head_ref }}"

          echo "Target branch: $BASE_BRANCH"
          echo "Source branch: $HEAD_BRANCH"

          if [ "$BASE_BRANCH" == "main" ] && [ "$HEAD_BRANCH" != "develop" ]; then
            echo "::error::PRs to 'main' are only allowed from 'develop'. Please merge your changes into 'develop' first."
            exit 1
          fi

          echo "Branch check passed!"
