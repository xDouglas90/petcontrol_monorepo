name: Go CI

on:
  push:
    branches: ['main']
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'infra/docker/docker-compose.yml'
      - 'infra/sql/**'
      - 'infra/migrations/**'
      - 'go.work'
      - 'go.work.sum'
      - 'Makefile'
      - '.github/workflows/go.yml'
  pull_request:
    branches: ['main']
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'infra/docker/docker-compose.yml'
      - 'infra/sql/**'
      - 'infra/migrations/**'
      - 'go.work'
      - 'go.work.sum'
      - 'Makefile'
      - '.github/workflows/go.yml'

jobs:
  docker-compose-config:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose file
        run: docker compose -f infra/docker/docker-compose.yml config

  api:
    name: API Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: apps/api/go.sum
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  worker:
    name: Worker Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: apps/worker/go.sum
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  sqlc-check:
    name: SQLC Generation Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
      - name: Run sqlc generate
        run: sqlc generate
      - name: Ensure generated files are up to date
        run: git diff --exit-code
