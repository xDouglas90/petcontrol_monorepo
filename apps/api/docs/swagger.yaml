basePath: /api/v1
definitions:
  handler.APIErrorResponseDoc:
    properties:
      code:
        type: string
      correlation_id:
        type: string
      error:
        type: string
    type: object
  handler.LoginRequestDoc:
    properties:
      email:
        example: admin@petcontrol.local
        type: string
      password:
        example: password123
        type: string
    type: object
  handler.LoginResponseDoc:
    properties:
      data:
        $ref: '#/definitions/service.LoginResult'
    type: object
  handler.ScheduleCreateRequestDoc:
    properties:
      client_id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      estimated_end:
        example: "2026-04-10T16:00:00Z"
        type: string
      notes:
        example: Banho e tosa
        type: string
      pet_id:
        example: 22222222-2222-2222-2222-222222222222
        type: string
      scheduled_at:
        example: "2026-04-10T15:00:00Z"
        type: string
      status:
        example: waiting
        type: string
      status_notes:
        example: Aguardando confirmação
        type: string
    type: object
  handler.ScheduleDoc:
    properties:
      client_id:
        example: 44444444-4444-4444-4444-444444444444
        type: string
      company_id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      created_at:
        example: "2026-04-10T10:00:00Z"
        type: string
      current_status:
        example: confirmed
        type: string
      deleted_at:
        example: "2026-04-11T11:00:00Z"
        type: string
      estimated_end:
        example: "2026-04-10T16:00:00Z"
        type: string
      id:
        example: 33333333-3333-3333-3333-333333333333
        type: string
      notes:
        example: Banho e tosa
        type: string
      pet_id:
        example: 55555555-5555-5555-5555-555555555555
        type: string
      scheduled_at:
        example: "2026-04-10T15:00:00Z"
        type: string
      updated_at:
        example: "2026-04-10T11:00:00Z"
        type: string
    type: object
  handler.ScheduleHistoryItemDoc:
    properties:
      changed_at:
        example: "2026-04-10T11:00:00Z"
        type: string
      changed_by:
        example: 22222222-2222-2222-2222-222222222222
        type: string
      id:
        example: 66666666-6666-6666-6666-666666666666
        type: string
      notes:
        example: Confirmado por telefone
        type: string
      schedule_id:
        example: 33333333-3333-3333-3333-333333333333
        type: string
      status:
        example: confirmed
        type: string
    type: object
  handler.ScheduleHistoryResponseDoc:
    properties:
      data:
        items:
          $ref: '#/definitions/handler.ScheduleHistoryItemDoc'
        type: array
    type: object
  handler.ScheduleItemResponseDoc:
    properties:
      data:
        $ref: '#/definitions/handler.ScheduleDoc'
    type: object
  handler.ScheduleListResponseDoc:
    properties:
      data:
        items:
          $ref: '#/definitions/handler.ScheduleDoc'
        type: array
    type: object
  handler.ScheduleUpdateRequestDoc:
    properties:
      client_id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      estimated_end:
        example: "2026-04-10T16:00:00Z"
        type: string
      notes:
        example: Confirmado com o cliente
        type: string
      pet_id:
        example: 22222222-2222-2222-2222-222222222222
        type: string
      scheduled_at:
        example: "2026-04-10T15:00:00Z"
        type: string
      status:
        example: confirmed
        type: string
      status_notes:
        example: Confirmado por telefone
        type: string
    type: object
  service.LoginResult:
    properties:
      access_token:
        type: string
      company_id:
        type: string
      kind:
        type: string
      role:
        type: string
      token_type:
        type: string
      user_id:
        type: string
    type: object
info:
  contact: {}
  description: API HTTP do PetControl para autenticação, módulos de tenant e agendamentos.
  title: PetControl API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Performs login and returns a bearer token and tenant context.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.LoginResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      summary: Authenticate user
      tags:
      - auth
  /schedules:
    get:
      description: Returns schedules from the authenticated tenant.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ScheduleListResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: List schedules
      tags:
      - schedules
    post:
      consumes:
      - application/json
      description: Creates a schedule for the authenticated tenant.
      parameters:
      - description: Schedule payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ScheduleCreateRequestDoc'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.ScheduleItemResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Create schedule
      tags:
      - schedules
  /schedules/{id}:
    delete:
      description: Soft deletes a schedule from the authenticated tenant.
      parameters:
      - description: Schedule ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Delete schedule
      tags:
      - schedules
    get:
      description: Returns a single schedule from the authenticated tenant.
      parameters:
      - description: Schedule ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ScheduleItemResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get schedule by ID
      tags:
      - schedules
    put:
      consumes:
      - application/json
      description: Updates a schedule for the authenticated tenant.
      parameters:
      - description: Schedule ID
        in: path
        name: id
        required: true
        type: string
      - description: Schedule payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ScheduleUpdateRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ScheduleItemResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Update schedule
      tags:
      - schedules
  /schedules/{id}/history:
    get:
      description: Returns status history for a schedule in the authenticated tenant.
      parameters:
      - description: Schedule ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ScheduleHistoryResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get schedule history
      tags:
      - schedules
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Use o formato: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
