info:
  contact: {}
  description: API HTTP do PetControl para autenticação, módulos de tenant e agendamentos.
  title: PetControl API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Performs login and returns a bearer token and tenant context.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.LoginResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      summary: Authenticate user
      tags:
      - auth
  /clients:
    get:
      description: Returns clients from the authenticated tenant.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ClientListResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: List clients
      tags:
      - clients
    post:
      consumes:
      - application/json
      description: Creates a client for the authenticated tenant.
      parameters:
      - description: Client payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ClientCreateRequestDoc'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.ClientItemResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Create client
      tags:
      - clients
  /clients/{id}:
    delete:
      description: Deactivates the tenant association for a client.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Deactivate client
      tags:
      - clients
    get:
      description: Returns a single client from the authenticated tenant.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ClientItemResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get client by ID
      tags:
      - clients
    put:
      consumes:
      - application/json
      description: Updates a client from the authenticated tenant.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      - description: Client payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ClientUpdateRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ClientItemResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.APIErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Update client
      tags:
      - clients
  /companies/current:
    get:
      description: Returns the company resolved from the authenticated tenant context.
      produces:
      - application/json
      responses:
        "200":
