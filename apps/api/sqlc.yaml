version: '2'
sql:
  - engine: 'postgresql'
    queries: '../../infra/sql/queries/*'
    schema: '../../infra/migrations'
    gen:
      go:
        package: 'sqlc'
        out: './internal/db/sqlc'
        sql_package: 'pgx/v5'
        emit_json_tags: true
        emit_db_tags: true
        emit_exact_table_names: false
        emit_interface: true
