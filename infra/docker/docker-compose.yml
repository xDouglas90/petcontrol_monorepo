services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-petcontrol}
      POSTGRES_USER: ${POSTGRES_USER:-petcontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petcontrol}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-petcontrol} -d ${POSTGRES_DB:-petcontrol}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@petcontrol.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  asynqmon:
    image: hibiken/asynqmon:latest
    depends_on:
      redis:
        condition: service_healthy
    command:
      - '--redis-addr=redis:6379'
      - '--port=${ASYNQMON_PORT:-8081}'
    ports:
      - '${ASYNQMON_PORT:-8081}:${ASYNQMON_PORT:-8081}'

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
      - '${MAILHOG_UI_PORT:-8025}:8025'

volumes:
  postgres18_data:
  redis_data:
  pgadmin_data:
